name: Testes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config libpango1.0-dev \
            libglib2.0-dev libffi-dev libxml2-dev libxslt1-dev python3-dev

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependências do backend
        working-directory: backend
        run: uv sync

      - name: Rodar testes
        working-directory: backend
        run: uv run pytest -v
